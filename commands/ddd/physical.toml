description = "Transform the technology-agnostic logical design into a concrete, implementation-ready Physical Architecture Specification."
prompt = """
**Role:** Lead Software Architect
**Context:** You are interpreting the Domain Model defined in: **{{args}}** (`LOGICAL_ARCHITECTURE.md`).
**Goal:** Transform the technology-agnostic logical design into a concrete, implementation-ready Physical Architecture Specification aligned with the project's stack.
**Output Artifact:** `PHYSICAL_ARCHITECTURE.md`

## Mission
Your objective is to design a **Clean Architecture** solution using the technical stack and conventions defined in the project's `GEMINI.md`.
**Core Philosophy:** Radical Simplicity. We are refactoring a "Big Ball of Mud." The new system must be intuitive, decoupled, and strictly typed (if applicable to the language).

## Technology Stack & Constraints
1. **Mandatory Check:** Read `GEMINI.md` in the root directory. You MUST adhere to the **Language/Framework**, **Testing Framework**, and **Runtime Environment** defined there.
2. **Persistence Strategy:** Align with the project's preferred database and ORM/Persistence pattern (e.g., Code-First, Repository Pattern).
3. **Hosting:** Design for the runtime environment defined in `GEMINI.md` (e.g., Cloud Run, GKE).

## Design Directives

### 1. Solution Structure (The "Onion")
Organize the codebase into clear layers (Domain, Application, Infrastructure, API/Interface) using the standard conventions for your specific technology stack (e.g., Go modules, npm workspaces, Maven/Gradle modules).
*   **Domain:** Pure logic. Aggregates, Value Objects, Repository Interfaces. No external dependencies.
*   **Application/Features:** The "Orchestration" layer. Organize by **Feature** (Vertical Slices) where possible.
*   **Infrastructure:** Implementation of repository interfaces, database context, and external service adapters.
*   **API/Entry:** The public interface (REST, GraphQL, CLI, etc.). No business logic here.

### 2. Implementation Rules
*   Use the most modern, idiomatic syntax for your language (as defined in `GEMINI.md`).
*   Ensure all architectural components map directly back to the `LOGICAL_ARCHITECTURE.md`.

## Output Structure (Markdown)

### Section 1: Executive Summary
*   **System Name:** [Derived]
*   **Architecture:** Clean Architecture (Modular/Layered).
*   **Tech Stack:** [Summary of Language/Framework/DB from GEMINI.md].

### Section 2: Solution Layout (ASCII Tree)
Show the directory and file structure appropriate for the stack.
```text
src/
├── domain/
├── application/
├── infrastructure/
└── api/
...
```

### Section 3: Domain Layer Implementation
Provide class/struct signatures and method definitions for Aggregates (mapped from Logical Arch).

### Section 4: Application & Infrastructure Details
Define the key services, handlers, and persistence strategies required to satisfy the Logical Business Rules.

### Section 5: Mermaid Component Diagram (Graph TD)
Visualize the flow: `Entry Point` -> `Application Service/Handler` -> `Domain Model` -> `Repository/Infrastructure`.

---

## Execution Protocol
1.  **Ingest:** Read `LOGICAL_ARCHITECTURE.md`.
2.  **Verify Stack:** Read `GEMINI.md`.
3.  **Design:** Map Logical Entities to the specific constructs of your tech stack.
4.  **Write:** Generate `PHYSICAL_ARCHITECTURE.md`.
"""