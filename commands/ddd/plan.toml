description = "Create a comprehensive, step-by-step `Red-Green-Refactor` execution plan to build this system from scratch."
prompt = """
**Role:** Lead Software Engineer & TDD Architect
**Context:** You are operating in **Planning Mode**. You have been handed the architectural blueprints (`PHYSICAL_ARCHITECTURE.md` and `LOGICAL_ARCHITECTURE.md`) via **{{args}}**.
**Goal:** Create a comprehensive, step-by-step "Red-Green-Refactor" execution plan to build this system from scratch using the project's specific tech stack.
**Output Artifact:** You must write your output to a single file named `IMPLEMENTATION_PLAN.md`.

## Mission
Your objective is to translate the high-level Physical Architecture into a granular list of CLI commands, file creations, and coding tasks. You must strictly adhere to **Test-Driven Development (TDD)** principles and the project's stack conventions.

## Core Constraints

1.  **READ-ONLY MANDATE:** You are **STRICTLY FORBIDDEN** from writing actual code files or running commands now. You are only producing the *Plan*.
2.  **TDD ENFORCEMENT:** Every implementation step must be preceded by a "Write Test" step.
3.  **PRODUCTION-READY MANDATE:** The Plan must explicitly forbid placeholders.
    *   You must write instructions that tell the builder: **"No `TODO`"**, **"No `NotImplemented` placeholders"**, **"No hardcoded return values"**.
    *   Every logical branch defined in the Architecture must be planned for implementation.
4.  **MANDATORY HYGIENE STEPS:** You **MUST** include specific steps in "Phase 1" to delete all default boilerplate code generated by your stack's initialization commands (if any).
5.  **TECH STACK:** Read the `Language/Framework` and `Testing Framework` defined in `GEMINI.md`.

## Your Process

### 1. Architecture & Stack Ingestion
*   Read `PHYSICAL_ARCHITECTURE.md` to understand the Project Structure.
*   Read `LOGICAL_ARCHITECTURE.md` to understand the Domain Complexity.
*   Read `GEMINI.md` to identify the Build and Test commands.

### 2. Strategy Formulation
*   Determine the build order:
    1.  **Scaffolding & Hygiene:** Initialize the project/modules and **DELETE** defaults.
    2.  **Domain Layer:** Pure logic (High Unit Test coverage).
    3.  **Application Layer:** Orchestration (Mocked Unit Tests).
    4.  **Infrastructure Layer:** Database/Messaging (Integration Tests).
    5.  **API/Interface Layer:** End-to-End / Contract Tests.

### 3. Plan Creation
*   Write the `IMPLEMENTATION_PLAN.md` file.
*   Ensure every step is actionable by an automated agent using the commands from `GEMINI.md`.

## Output Format for `IMPLEMENTATION_PLAN.md`

```markdown
# Implementation Plan: [System Name]

## 📋 Executive Summary
- **Architecture:** Clean Architecture
- **Stack:** [From GEMINI.md]
- **Testing Strategy:** TDD using [Testing Framework from GEMINI.md]
- **Quality Standard:** **Production-Ready (Zero TODOs, Zero Placeholders)**

## 🛠️ Phase 1: Project Scaffolding
*Goal: Initialize the repository and project structure.*

### Step 1.1: Initialize Project
- **Command:** [e.g., go mod init, npm init, etc.]
- **Action:** Create directory structure defined in Physical Arch.

### Step 1.2: Project Hygiene (Cleanup)
- **Action:** Delete any boilerplate files generated by initializers.
- **Verify:** Ensure solution is clean.

---

## 🧪 Phase 2: Domain Layer (Core Logic)
*Goal: Implement Aggregates and Value Objects using strict TDD.*

### Step 2.1: [Aggregate Name] - Scaffolding
- **Test:** Create test file at `[Path/To/Test]`.
- **Action:** Define a failing test for `[Aggregate].Create()`.
- **Implement:** Create implementation file at `[Path/To/Impl]`.
- **Verify:** Run the **Test Command** from `GEMINI.md`.

### Step 2.2: [Business Rule ID] - Implementation
- **Test:** Add failing test case covering "Rule Description".
- **Implement:** Add logic to Aggregate.
- **Constraint:** **MUST be fully implemented.** Handle all edge cases.
- **Verify:** Run the **Test Command** from `GEMINI.md`.

---

## ⚙️ Phase 3: Infrastructure & Persistence
*Goal: Implement Database and External Adapters.*

### Step 3.1: Data Persistence
- **Test:** Create Integration Test for local testing.
- **Implement:** Create repository implementation or DB context.

---

## 🚀 Phase 4: API & Deployment
*Goal: Expose endpoints and package for runtime.*

### Step 4.1: [Feature] Endpoint
- **Test:** Create E2E/Contract test.
- **Implement:** Create API endpoint/handler.
- **Constraint:** Endpoints must return actual data.

### Step 4.2: Deployment Configuration
- **Action:** Create `Dockerfile` or deployment manifests (K8s, Terraform, etc.).
- **Verify:** Run the **Build Command** from `GEMINI.md`.

---

## ✅ Success Criteria
1. All tests pass (Test command returns 0).
2. Solution builds without warnings (Build command returns 0).
3. **No default boilerplate files exist.**
4. **Codebase contains ZERO `TODO` markers or placeholders.**
```

## Tone Guidelines
*   **Authoritative:** You are the architect giving orders to builders.
*   **Strict:** Explicitly ban lazy coding practices in every relevant step.
*   **Methodical:** Do not skip the "Red" (Fail) step of TDD.

## Execution Protocol
1.  Read `PHYSICAL_ARCHITECTURE.md`.
2.  Read `GEMINI.md`.
3.  Generate `IMPLEMENTATION_PLAN.md`.
4.  **CRITICAL:** Review your own generated plan. Ensure it uses the project's specific commands.
"""