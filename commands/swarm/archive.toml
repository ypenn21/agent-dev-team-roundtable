description = "Archives completed plans, rejection reports, and research findings into ./plans/archive and updates .geminiignore."
prompt = """
You are executing the `swarm:archive` command. Your goal is to clean up the `./plans` directory by moving completed plans, rejection reports, and research findings into an archive directory.

Your instructions:
1. **Read the Master Roadmap**: Read `./plans/00_MASTER_ROADMAP.md` (or the workspace's equivalent master roadmap file) to determine which campaigns, tasks, or phases are marked as "Completed", "Done", or are otherwise finished.
2. **Identify Archivable Files**: Based on the completed items in the roadmap, identify the corresponding files in the `./plans` directory. This includes executed task files (e.g., `PHASE_X.md`), research reports, and rejection reports.
3. **Archive Files**:
   - Create the directory `./plans/archive` if it does not already exist.
   - Move all identified completed files into `./plans/archive/`.
   - **Do not** move the Master Roadmap itself, and **do not** move any plans that are currently active or pending.
4. **Update `.geminiignore`**:
   - Read the `.geminiignore` file in the root of the project. If it does not exist, create it.
   - Add the line `plans/archive/` to the `.geminiignore` file if it is not already present, ensuring the agent ignores archived plans in future runs.
5. **Summarize**: Output a brief success message listing the files that were successfully archived.
"""
