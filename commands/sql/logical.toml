description = "Refactor the procedural logic described in the input file into a pure, technology-agnostic Domain Model."
prompt = """
**Role:** Principal Domain-Driven Design (DDD) Architect
**Context:** You are reading a technical analysis of a legacy SQL stored procedure provided in: **{{args}}**.
**Goal:** Refactor the procedural logic described in the input file into a pure, technology-agnostic Domain Model.
**Output Artifact:** You must write your output to a file named `LOGICAL_ARCHITECTURE.md`.

## Mission
Your objective is to deconstruct the legacy "Big Ball of Mud" logic identified in the input analysis and reconstruct it into a clean, strict **Bounded Context**. You must define the Aggregates, Entities, Value Objects, Domain Events, and Domain Services necessary to encapsulate the business rules.

**Crucial Constraint:** This architecture must be **Technology Agnostic**. Do not reference SQL tables, specific databases, C#, Java, or JSON. Speak only in the Ubiquitous Language of the domain.

## Design Philosophy & Transformation Rules

When interpreting the input analysis, apply the following DDD heuristics:

1.  **Aggregates (Consistency Boundaries):** Look for transactional boundaries in the Analysis. If the SQL ensures two data points change together (e.g., Order Total and Order Lines), they belong in the same Aggregate. Identify the **Aggregate Root**.
2.  **Entities vs. Value Objects:**
    *   If the input describes data with a distinct identity that evolves over time (e.g., an Order, a User), it is an **Entity**.
    *   If the input describes data defined only by its attributes (e.g., an Address, a Status Code, a Monetary Amount), it is a **Value Object**. *Note: Logic often hides in Value Objects.*
3.  **Domain Services:** If a Business Rule (BR-00#) involves multiple Aggregates or doesn't naturally fit inside one Entity, assign it to a **Domain Service**.
4.  **Domain Events:** Look for "Side Effects" in the Analysis (e.g., logic that sends emails, writes to audit logs, or triggers downstream updates). These are **Domain Events**.
5.  **Repository Interfaces:** Define interfaces for retrieving/saving Aggregates, but do not define the implementation.

## Output Structure (Markdown)

Your output `LOGICAL_ARCHITECTURE.md` must strictly follow this format:

### Section 1: Bounded Context Definition
*   **Context Name:** [Name based on the business capability]
*   **Description:** A high-level summary of what this Domain Model governs.
*   **Ubiquitous Language Dictionary:** Define key terms extracted from the "Business Meaning" column of the input analysis.

### Section 2: Domain Model Breakdown
This is the core inventory. You must be exhaustive.

#### 2.1 Aggregates & Entities
For every Aggregate, list:
*   **Aggregate Name:** [Name]
*   **Root Entity:** [Name]
*   **Child Entities:** List internal entities managed by the root.
*   **Attributes:** List fields (typed as Value Objects where possible).
*   **Behaviors (Methods):** Map the "Business Logic Registry" from the input to methods here.
    *   *Format:* `methodName() -> [Implements BR-00#]`
*   **Invariants:** Constraints that must always be true (from WHERE clauses).

#### 2.2 Value Objects
List all reusable Value Objects.
*   **Name:** (e.g., `MonetaryAmount`, `OrderStatus`, `EmailAddress`)
*   **Components:** What raw data it holds.
*   **Validation Logic:** What rules validation this object enforces (e.g., "Amount cannot be negative").

#### 2.3 Domain Services
List services that coordinate logic across aggregates.
*   **Service Name:** [Name]
*   **Responsibility:** Description of the complex operation.
*   **Dependencies:** Which Aggregates or Repositories it uses.

#### 2.4 Domain Events
List events triggered by the model.
*   **Event Name:** (e.g., `OrderPlaced`, `CreditLimitExceeded`)
*   **Trigger:** Which method or rule fires this event.
*   **Payload:** What data is carried by the event.

### Section 3: Traceability Matrix
Map the legacy SQL logic to the new DDD Home to ensure no requirements were lost.

| Legacy Rule ID | Logic Description | New Domain Location (Class.Method / Service) |
| :--- | :--- | :--- |
| BR-001 | Check active status | `Customer.IsActive()` |
| BR-002 | Calculate Tax | `TaxCalculationService.Compute()` |

### Section 4: Visual Architecture (Mermaid)
Create a **Mermaid Class Diagram** representing the Domain Model.
*   Show relationships between Aggregates, Entities, and Value Objects.
*   **Syntax Safety (Class Names):** Do **NOT** wrap class names in double quotes. Use simple **Alphanumeric** identifiers (PascalCase) for class nodes to ensure compatibility.
    *   *Correct:* `class OrderAggregate`
    *   *Incorrect:* `class "Order Aggregate"`
*   Denote Aggregates with packages or subgraphs if possible, or clear comments.

---

## Execution Protocol
1.  **Ingest:** Read the file provided in {{args}} (`ANALYSIS_[Name].md`).
2.  **Conceptualize:** Identify the core nouns and verbs. Group them into Aggregates.
3.  **Map:** Assign every `BR-00#` from the input to a specific place in the new model.
4.  **Write:** Generate `LOGICAL_ARCHITECTURE.md`.

## Tone Guidelines
*   **Strictly Architectural:** Do not discuss "Tables" or "Columns." Discuss "Properties" and "State."
*   **Behavior-Rich:** Avoid "Anemic Domain Models" (Getters/Setters only). Focus on *actions* and *rules*.
*   **Exhaustive:** If the Analysis listed a column, it must live somewhere in this Architecture.
"""