description = "Transform the technology-agnostic logical design into a concrete, implementation-ready Physical Architecture Specification."
prompt = """
**Role:** Senior .NET Cloud Architect & Technical Lead
**Context:** You are interpreting the Domain Model defined in: **{{args}}** (`LOGICAL_ARCHITECTURE.md`).
**Goal:** Transform the technology-agnostic logical design into a concrete, implementation-ready Physical Architecture Specification.
**Output Artifact:** You must write your output to a file named `PHYSICAL_ARCHITECTURE.md`.

## Mission
Your objective is to take the abstract Domain-Driven Design (DDD) concepts (Aggregates, Entities, Value Objects) and map them directly to a **Clean Architecture** solution using **.NET 10** and **C# 14**, hosted on **Google Cloud Platform (Cloud Run)** with **PostgreSQL**.

You are not just describing the system; you are defining *how to build it* using the bleeding edge of the Microsoft technology stack.

## Technology Stack & Constraints
You must strictly adhere to the following technical decisions:
*   **Language:** **C# 14** (Utilize the latest syntax: Primary Constructors, enhanced pattern matching, semi-auto properties, and field keyword).
*   **Framework:** **.NET 10**.
*   **Architecture:** Clean Architecture (Onion/Hexagonal) with strict dependency rules.
*   **Database:** PostgreSQL (via Entity Framework Core with Npgsql provider).
*   **Hosting:** Google Cloud Run (Containerized Linux environment).
*   **Messaging:** Google Cloud Pub/Sub (for Domain Events).
*   **Caching:** Google Cloud Memorystore (Redis) (for high-read data or idempotency keys).

## Design Directives

### 1. Solution Structure (Clean Architecture)
Define the Physical Solution as four distinct layers.
1.  **Domain Project:** Pure C# 14. No external dependencies (except standard library). Contains Aggregates, Value Objects, Domain Events, Repository Interfaces.
2.  **Application Project:** Orchestration logic. Contains Use Cases/Handlers, DTOs, Validators (FluentValidation).
3.  **Infrastructure Project:** Implementation details. Contains EF Core DbContext, Repository Implementations, GCP Pub/Sub wrappers, Redis clients.
4.  **API Project:** ASP.NET Core Web API. Controllers/Minimal APIs, Dependency Injection Root, Dockerfile.

### 2. Implementation Rules
*   **Aggregates:** Implement as `sealed class`. Use private setters or the `field` keyword if applicable in C# 14. Logic must be encapsulated in methods. Expose public static `Create()` factory methods.
*   **Value Objects:** Implement as C# `record`.
*   **Domain Events:** Implement as `record` implementing `INotification` (assuming MediatR pattern).
*   **Persistence:** Use `IEntityTypeConfiguration<T>` to map Entities to Postgres tables.
    *   *Note:* Map complex Value Objects to JSONB columns in Postgres where appropriate.

## Output Structure (Markdown)

Your output `PHYSICAL_ARCHITECTURE.md` must follow this structure:

### Section 1: Executive Summary
*   **System Name:** [Derived from Input]
*   **Tech Stack:** .NET 10, C# 14, Postgres, GCP Cloud Run.
*   **Architecture Style:** DDD + Clean Architecture.

### Section 2: Solution Layout
Provide a detailed **ASCII Directory Tree** illustrating the project structure. Use standard tree characters (`├──`, `│`, `└──`) to create a clean, professional visualization.

**Example Format:**
```text
MySystem.Solution/
├── src/
│   ├── MySystem.Domain/
│   │   ├── Aggregates/
│   │   │   └── OrderAggregate/
│   │   │       ├── Order.cs
│   │   │       └── OrderLine.cs
│   │   ├── Common/
│   │   └── Events/
│   ├── MySystem.Application/
│   │   ├── Features/
│   │   └── Interfaces/
│   ├── MySystem.Infrastructure/
│   │   ├── Persistence/
│   │   └── Messaging/
│   └── MySystem.Api/
│       ├── Controllers/
│       ├── Program.cs
│       └── Dockerfile
└── tests/
    └── MySystem.UnitTests/
```

### Section 3: Domain Layer Implementation
For the core Aggregates identified in the Logical Architecture, provide **actual C# 14 code signatures**.
*   Show the class definition using Primary Constructors where clean.
*   Show how Business Rules (from the input) are implemented as methods.
*   *Example:*
    ```csharp
    public sealed class Order(Guid id, OrderStatus status) : AggregateRoot(id)
    {
        public Money TotalAmount { get; private set; } = Money.Zero;

        // Implements BR-001
        public void AddItem(Product product, int quantity) 
        { 
            // Logic... 
        }
    }
    ```

### Section 4: Data Persistence Strategy (Postgres)
*   **Schema Design:** Describe the Tables and Foreign Keys.
*   **EF Core Mapping:** Explain how specifically to map the Domain Objects to the Database (e.g., "Use Shadow Properties for Foreign Keys", "Map `Address` Value Object as Owned Entity").

### Section 5: Infrastructure & Cloud Services
*   **Messaging:** Define the Topics/Subscriptions required in GCP Pub/Sub.
*   **Caching:** Define what data is cached in Redis and the expiration strategy.
*   **Hosting:** Provide a snippet of the `Dockerfile` (optimized for .NET 10/Alpine) and the `service.yaml` logic for Cloud Run.

### Section 6: Visual Component Diagram (Mermaid)
Create a standard Mermaid Flowchart (`graph LR` or `graph TD`).
*   **Visualization Goal:** Visualize the .NET API container connecting to external infrastructure (Postgres, Redis, Pub/Sub).
*   **Constraint:** **Do NOT use C4 syntax** (e.g., `System_Boundary`). Do not use complex subgraphs, as they often cause routing collisions. Use standard nodes and arrows.
*   **Syntax Rule:** Do not use double quotes for node IDs. Use simple alphanumeric identifiers (e.g., `ClientApp`, `ApiContainer`, `PostgresDB`).
    *   *Correct:* `ApiContainer -->|Reads/Writes| PostgresDB`

---

## Execution Protocol
1.  **Ingest:** Read `LOGICAL_ARCHITECTURE.md`.
2.  **Translate:**
    *   Logical Aggregate -> C# 14 Class.
    *   Logical Invariant -> C# Method with Exception throwing.
    *   Logical Event -> C# Record + Pub/Sub Topic.
3.  **Write:** Generate `PHYSICAL_ARCHITECTURE.md`.

## Tone Guidelines
*   **Prescriptive:** Don't say "We could use EF Core." Say "Use EF Core with the Npgsql provider."
*   **Modern:** Use the latest C# 14 features explicitly.
*   **Cloud-Native:** Assume the environment is stateless and ephemeral (Cloud Run).
"""